<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://spark.lucko.me; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Analyze Minecraft server configuration values from a spark report.">
  <title>Spark Configuration Checker</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="module" src="./app.js"></script>
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <p class="eyebrow">Profiler Utils</p>
      <h1>Spark Configuration Checker</h1>
      <p class="intro">Paste a spark report URL to inspect its server configuration. Processing happens in your browser.</p>
    </header>

    <section class="panel">
      <h2>Analyze report</h2>
      <form id="analyze-form">
        <label for="spark-url">Spark report URL</label>
        <div class="input-row">
          <input id="spark-url" type="url" placeholder="https://spark.lucko.me/xxxxxxxxxx" autocomplete="off" spellcheck="false" required>
          <button id="analyze-button" type="submit">Analyze</button>
        </div>
      </form>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>

    <section id="summary-panel" class="panel hidden">
      <div class="section-heading-row">
        <div>
          <h2>Summary</h2>
          <p id="rules-version" class="muted"></p>
        </div>
        <button id="toggle-passed" class="secondary-button" type="button">Hide passed</button>
      </div>
      <div id="summary-counters" class="summary-counters"></div>
    </section>

    <section id="results" class="results" aria-live="polite"></section>

    <footer class="page-footer">
      <p>Report data is fetched directly from spark.lucko.me and is not uploaded elsewhere by this page.</p>
    </footer>
  </main>
</body>
</html>
